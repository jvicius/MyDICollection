<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
	<!-- El transform centra el logo matemáticamente en un canvas de 500x500 
         y le da la inclinación (skew) característica de la franquicia -->
	<g transform="translate(25, 200) skewY(-9)" fill="#FFFFFF">

		<!-- Letra I -->
		<rect x="30" y="0" width="90" height="160" />

		<!-- Letra N trazada con precisión para empatar la diagonal gruesa -->
		<path d="M 150 160 
                 L 150 0 
                 L 240 0 
                 L 330 80 
                 L 330 0 
                 L 420 0 
                 L 420 160 
                 L 330 160 
                 L 240 80 
                 L 240 160 Z" />
	</g>
</svg>